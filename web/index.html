<html lang="en" data-theme="dark" data-wallpaper="aurora">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#030D1A" />
    <title>OpenMasjid Donations</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <script>
      // Apply the persisted theme + wallpaper before first paint to avoid a flash
      // of the wrong look. The full prefs module (with OpenMasjidOS appearance
      // inheritance) hydrates immediately after.
      try {
        var p = JSON.parse(localStorage.getItem('omdon-prefs') || '{}');
        var t = p.theme === 'light' || p.theme === 'dark'
          ? p.theme
          : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', t);
        if (p.wallpaper) document.documentElement.setAttribute('data-wallpaper', p.wallpaper);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
