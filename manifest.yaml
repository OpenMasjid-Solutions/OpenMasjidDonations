id: donations
name: OpenMasjid Donations
tagline: Take card donations on your masjid's network with Stripe
category: donations
version: 0.32.0
author: OpenMasjid-Solutions
license: AGPL-3.0-only
icon: icon.svg
screenshots:
  - screenshots/1.svg
description: |
  **OpenMasjid Donations** gives your masjid a beautiful, self-hosted donation
  website powered by **Stripe**. Put it on a screen by the door with a QR code, or
  open it on any phone — a supporter picks a cause, chooses a preset or their own
  amount (one-time or monthly), and pays securely by card.

  - **Appeals you control** — create as many as you like (General Fund, Zakat,
    Building Fund, Ramadan Appeal…), each with its own wording, images, preset
    amounts and an optional goal.
  - **Preset *and* custom amounts** — clear suggested buttons plus a "choose your
    own" field, one-time or monthly.
  - **Card payments, on your own page** — powered by Stripe's secure card field.
    Your masjid's card details and keys stay on your device; supporters' card
    numbers go straight to Stripe and never touch this app.
  - **A simple admin panel** — manage appeals, see your donations and totals,
    export a spreadsheet, and set your theme to match the rest of OpenMasjidOS.

  **Nothing to fill in here — just install.** When it's running, click **Open** —
  it signs you in with your OpenMasjidOS login and matches your dashboard's
  light/dark look and wallpaper. Then add your Stripe keys and your first appeal
  inside the app. It runs happily on a Raspberry Pi or mini-PC, on your masjid's
  own network.

# OpenMasjidOS Fabric: opt into single sign-on. The platform issues this app a
# per-app secret at install (OPENMASJID_APP_SECRET) and honours its identity-bound
# /api/auth/session calls, so "Open" signs you in with your OpenMasjidOS login.
# The app still works fully standalone (its own admin password) when the Fabric is
# absent. The compose MUST reference the injected vars in `environment:` (it does).
sso: true
# Opt into Fabric notifications so the app can relay alerts — e.g. "A new donation
# of £50 was received" — to the masjid's configured webhook via POST
# /api/fabric/notify. The app never sees the webhook URL; it fails soft when
# notifications aren't enabled.
notifications: true
# This app uses Stripe's in-page secure card field (Elements), which requires a
# browser secure context — so it MUST be served over HTTPS. The platform serves
# it on a dedicated HTTPS port (terminating TLS with the dashboard's cert); this
# container stays a plain HTTP server and does nothing special for TLS.
https: true
# Opt into the Fabric Stripe capability: the admin configures Stripe ONCE in
# OpenMasjidOS (Settings → Payments) and this app fetches the vaulted keys
# server-to-server (never pasted here, never stored on this app's disk, backed up
# and migrated with the platform). Falls back to locally-entered keys when run
# standalone. The platform issues the per-app secret used to fetch them.
stripe: true
# Opt into the Fabric remote-access/public-URL capability. The admin runs ONE
# Cloudflare Tunnel in OpenMasjidOS (Settings → Remote access); the platform reaches
# this app on a single hostname under an admin-chosen path (default the app id), e.g.
# https://omos.<domain>/donate/…. We ask the platform for our public base + path via
# GET /api/fabric/site and use it for share links, QR codes and the Stripe webhook URL.
# Cloudflare forwards the FULL path prefix (it does not strip it), so the server is
# base-path aware (strips the prefix before routing; injects <base href> into the SPA).
# Falls back to this device's own address when remote access is off / standalone.
domain: true
# Opt into the Fabric app-to-app broker as a CONSUMER of the OpenMasjid Students app's
# `billing` capability. A campaign whose type is `tuition` becomes a thin shell around
# Students: a parent looks up their child by name + PIN, we fetch the family balance from
# Students over the broker (POST ${OPENMASJID_BASE_URL}/api/fabric/app/students/billing/<method>,
# server→server with our per-app secret), they pay by card, and we record the payment back
# into the Students ledger. Students OWNS everything inside a tuition campaign. This grant
# (declared here) + the target's matching `provides` are what let the OS broker route our
# calls; without it every call is 403 not_granted. LAN-only, fail-soft: any broker error
# (target_not_installed / unreachable / timeout) hides the tuition campaign — the donation
# site always works regardless. See docs/STUDENTS_INTEGRATION.md + the authoritative
# students/billing v1 contract (OpenMasjidStudentManager/docs/FABRIC_BILLING_CONTRACT.md).
fabric:
  consumes:
    - students/billing
# Opt into Fabric email (platform v0.41.0+): the admin sets up ONE email provider (SMTP or
# Resend) once in OpenMasjidOS → Settings → Email, and we send a donor a branded receipt via
# POST /api/fabric/email — we never see the mail credentials or the From address. Opt-in in the
# app (admin toggle + editable receipt) and fail-soft: if email isn't set up ("not_configured")
# we simply don't email and still record the donation + show the on-screen thank-you.
email: true
# Admin alerts (platform v0.41.0+): each declared type gets a granular Email/Webhook on-off in
# OpenMasjidOS → Settings → Alerts (the admin picks the channel — we never do). We fire one with
# POST /api/fabric/alert. Fail-soft on `disabled_by_admin`. (No `reader-offline` here — this is a
# web/Stripe-Elements app with no card reader; that alert belongs to the Kiosk.)
alerts:
  - id: payment-failed
    label: A payment couldn't be started
    description: Stripe rejected a payment setup (e.g. bad or expired keys, or Stripe is down) — donors can't give until it's fixed.
  - id: tuition-record-failed
    label: A tuition payment wasn't recorded in Students
    description: A card payment succeeded but OpenMasjid Students rejected recording it. The money is safe (Students' reconciliation is the backstop) — please verify.
  - id: test
    label: Test message
    description: A test you trigger from the app (Settings → Email receipt → "Send me a test") to confirm OpenMasjidOS is reaching you by email/webhook.

# NO install settings — install is truly one-click (the platform shows no dialog).
# Everything is chosen INSIDE the app: on its admin Payments screen it lists the
# masjid's Stripe accounts from the Fabric (GET /api/fabric/stripe/accounts) and lets
# the admin pick one, then fetches that account's keys (GET /api/fabric/stripe?account=<id>).
# Masjid details / currency / standalone local keys are collected in the app's first-run setup.
ports:
  - container: 8080
    label: Donations site
